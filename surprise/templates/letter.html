{% load static %}
<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Letter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0008;--gold:#f5c842;--cream:#fff8f0;
  --text-dim:rgba(255,248,240,0.55);--paper:#1c0a10;
}
body{
  min-height:100vh;background:var(--bg);
  color:var(--cream);font-family:'Inter',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;padding:80px 20px 60px;
}

.page-title{
  font-family:'Playfair Display',serif;font-size:28px;
  color:var(--cream);margin-bottom:6px;text-align:center;
}
.page-sub{font-size:13px;color:var(--text-dim);text-align:center;letter-spacing:0.8px;margin-bottom:48px}

.envelope-wrap{
  cursor:pointer;text-align:center;
  transition:transform 0.3s;
  animation:envbounce 2s ease-in-out infinite;
}
.envelope-wrap:hover{transform:scale(1.06)}
@keyframes envbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.env-icon{font-size:90px;display:block;margin-bottom:12px}
.env-hint{font-size:13px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase}

.letter-container{
  display:none;
  width:min(700px,92vw);
  background:var(--paper);
  border:1px solid rgba(245,200,66,0.18);
  border-radius:20px;
  padding:clamp(24px,5vw,52px) clamp(20px,5vw,48px);
  box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 40px rgba(245,200,66,0.06);
  animation:paperIn 0.6s cubic-bezier(0.22,1,0.36,1);
}
.letter-container.show{display:block;}
@keyframes paperIn{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:none}}

.letter-text{
  font-family:'Lora',serif;font-size:clamp(14px,1.6vw,16px);
  color:rgba(255,248,240,0.88);line-height:2;
  white-space:pre-wrap;min-height:40px;
}

.back-row{
  margin-top:40px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap;
}
.btn{
  padding:12px 26px;border-radius:50px;border:none;
  font-family:'Playfair Display',serif;font-size:14px;cursor:pointer;transition:all 0.25s;
}
.btn-primary{background:linear-gradient(135deg,#f5c842,#e8a800);color:#1a0012;font-weight:700}
.btn-primary:hover{box-shadow:0 8px 24px rgba(245,200,66,0.4)}
.btn-ghost{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:var(--cream)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}

.fp{position:fixed;border-radius:50%;pointer-events:none;z-index:0;animation:fprise linear infinite}
@keyframes fprise{0%{transform:translateY(100vh);opacity:0}10%{opacity:0.5}90%{opacity:0.2}100%{transform:translateY(-10vh);opacity:0}}
</style>
</head>
<body>

<h1 class="page-title">💌 Secret Letter</h1>
<p class="page-sub">A message written from the heart</p>

<div class="envelope-wrap" id="envWrap" onclick="openLetter()">
  <span class="env-icon">✉️</span>
  <p class="env-hint">Click to open</p>
</div>

<div class="letter-container" id="letterBox">
  <p class="letter-text" id="letterText"></p>
  <div class="back-row">
    <a href="/"><button class="btn btn-primary">🏠 Back to Home</button></a>
  </div>
</div>

<audio id="music" loop>
  <source src="{% static 'music/letter_song.mp3' %}" type="audio/mpeg">
</audio>

<script>
let i=0;
const letter=`🎂 En Uyir Thangachiku... HBD d Chellam! 💖

Dei Paapa,

Innaiku un birthday... Unaku advance-a enoda manasarntha Happy Birthday d chellam! Intha special day-la epavum pola gethu-a oru wish mattum pannitu poga enaku manasu illa. Unkita nerla solla mudiyaatha, en manasoda aazhathula irunthu eluthura vaarthaigal ithu.

Palasaiyellam ninaichu paakuren... Namma vera vera veetula poranthurukalam. Pona jenmathula namma kandipa kooda poranthurupom, athanala thaan intha jenmathula kadavul unna en kitta anupirukaaru. Ratham kalakkaatiyum, nee enaku en petha thangachiya thaan da epavume.

En life-la yarume illanu ninaicha pala nimishangalla, enna getha nimira vechathu unoda antha sirippum, "Naan iruken na" nu nee kudutha dhairyamum thaan. Ammakku apram enna appadiye ethukuta ore jeevan nee thaan da. Sila neram naan un mela kovapatturukalam, aana athu un mela naan vechirukura paithiyakarathanamana urimaiyala thaan.

💖 En Bday Promise Unaku:

Velila naan evvalavo gettha suthalam, aana un kannula oru thuli kanneer vantha kooda intha annanoda manasu mothama odanjirum. Unaku oru kashtamna intha ulagathula yaraiyum ethirkira thunivu enaku varum. Nee engirunthalum, un life-la enna pannanum ninaichalum, intha annan un pinnala oru paarai mathiri thunaiyya nipppen.

Intha varusham mattum illa, innum ethana jenmam eduthalum enaku thangachiya nee thaan da venum. Unna paathukura poruppu enaku eppavume iruku.

Innaiku mathiri epavume intha sirippoda, life-la nee ninaicha ella heights-kum poga enoda vazhthukal da.

🎂 Once again, Happy Birthday d Chellam! 🥳

Ipadiku,

❤️ Ratham kalakkaatiyum, unnai uyiraga paarkum un Anbu Annan ❤️`;

function openLetter(){
  document.getElementById('music').play().catch(()=>{});
  const w=document.getElementById('envWrap');
  w.style.display='none';
  document.getElementById('letterBox').classList.add('show');
  typeIt();
}

function typeIt(){
  if(i<letter.length){
    const c=letter[i];
    document.getElementById('letterText').innerHTML+=c==='\n'?'<br>':c;
    i++;
    setTimeout(typeIt,40);
  }
}

for(let j=0;j<10;j++){
  const p=document.createElement('div');p.className='fp';
  const s=15+Math.random()*35;
  p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;background:radial-gradient(circle,rgba(245,200,66,0.2),transparent 70%);animation-duration:${12+Math.random()*8}s;animation-delay:-${Math.random()*12}s`;
  document.body.appendChild(p);
}
</script>
</body>
</html>
