<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Game</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0008;--gold:#f5c842;--rose:#ff85b3;
  --cream:#fff8f0;--text-dim:rgba(255,248,240,0.55);
}
body{
  min-height:100vh;background:var(--bg);
  color:var(--cream);font-family:'Inter',sans-serif;
  overflow:hidden;display:flex;flex-direction:column;
  align-items:center;
}

.hud{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;
  background:rgba(13,0,8,0.9);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(245,200,66,0.1);
}
.hud-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold)}
.hud-stats{display:flex;gap:20px}
.stat{text-align:center}
.stat-val{font-size:22px;font-weight:600;color:var(--gold);font-variant-numeric:tabular-nums;line-height:1}
.stat-lbl{font-size:10px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.stat-val.red{color:#ff6b6b}

.cake-target{
  position:absolute;font-size:64px;cursor:pointer;
  transition:transform 0.15s;
  user-select:none;
  filter:drop-shadow(0 0 12px rgba(245,200,66,0.4));
}
.cake-target:hover{transform:scale(1.15)}

.wish-flash{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:rgba(26,0,18,0.9);border:1px solid rgba(245,200,66,0.2);
  border-radius:50px;padding:10px 24px;
  font-family:'Playfair Display',serif;font-size:14px;color:var(--gold);
  opacity:0;transition:opacity 0.3s;pointer-events:none;
  white-space:nowrap;
}
.wish-flash.show{opacity:1}

.score-pop{
  position:absolute;font-size:16px;font-weight:600;color:var(--gold);
  pointer-events:none;animation:pop 0.8s forwards;
}
@keyframes pop{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-50px);opacity:0}}

.result{
  position:fixed;inset:0;background:rgba(13,0,8,0.95);z-index:200;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center;animation:fadeIn 0.5s;
}
.result.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.result-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(28px,5vw,48px);color:var(--cream);margin-bottom:8px;
}
.result-score{
  font-size:72px;font-weight:700;
  background:linear-gradient(135deg,#f5c842,#ff85b3);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin:16px 0;
}
.result-msg{font-size:16px;color:var(--text-dim);max-width:360px;line-height:1.6;margin-bottom:36px}
.btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{
  padding:12px 28px;border-radius:50px;border:none;
  font-family:'Playfair Display',serif;font-size:15px;cursor:pointer;transition:all 0.25s;
}
.btn-primary{background:linear-gradient(135deg,#f5c842,#e8a800);color:#1a0012;font-weight:700}
.btn-primary:hover{box-shadow:0 8px 30px rgba(245,200,66,0.4)}
.btn-ghost{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:var(--cream)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}

#gameArea{position:fixed;inset:60px 0 0;overflow:hidden}
</style>
</head>
<body>

<div class="hud">
  <span class="hud-title">🎂 Catch the Cake</span>
  <div class="hud-stats">
    <div class="stat"><div class="stat-val" id="scoreVal">0</div><div class="stat-lbl">Score</div></div>
    <div class="stat"><div class="stat-val red" id="timeVal">30</div><div class="stat-lbl">Time</div></div>
  </div>
</div>

<div id="gameArea">
  <div class="cake-target" id="cake">🎂</div>
</div>

<div class="wish-flash" id="wish"></div>

<div class="result" id="result">
  <h1 class="result-title">🎉 Happy Birthday Thangachi!</h1>
  <div class="result-score" id="finalScore">0</div>
  <p class="result-msg">That's your score! Amazing job — just like everything you do.</p>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="restart()">Play again</button>
    <a href="/"><button class="btn btn-ghost">🏠 Home</button></a>
  </div>
</div>

<script>
const wishes=[
  "Happy Birthday Thangachi ❤️",
  "Stay happy always 😊",
  "You are the best sister 💖",
  "Keep smiling forever 😄",
  "May all your dreams come true ✨",
  "Love you, my dear sister 🎂",
  "Best brother & sister forever 💛"
];

let score=0,timeLeft=30,timer;

function moveCake(){
  const area=document.getElementById('gameArea');
  const c=document.getElementById('cake');
  const x=Math.random()*(area.clientWidth-80);
  const y=Math.random()*(area.clientHeight-80);
  c.style.left=x+'px';c.style.top=y+'px';
}

document.getElementById('cake').onclick=function(){
  score++;
  document.getElementById('scoreVal').textContent=score;

  const wEl=document.getElementById('wish');
  wEl.textContent=wishes[Math.floor(Math.random()*wishes.length)];
  wEl.classList.add('show');
  setTimeout(()=>wEl.classList.remove('show'),1200);

  const pop=document.createElement('div');
  pop.className='score-pop';pop.textContent='+1';
  const c=document.getElementById('cake');
  pop.style.left=c.style.left;pop.style.top=c.style.top;
  document.getElementById('gameArea').appendChild(pop);
  setTimeout(()=>pop.remove(),800);

  this.textContent='🍰';
  setTimeout(()=>{this.textContent='🎂';moveCake();},400);
};

moveCake();

timer=setInterval(()=>{
  timeLeft--;
  document.getElementById('timeVal').textContent=timeLeft;
  if(timeLeft<=0){
    clearInterval(timer);
    document.getElementById('cake').style.display='none';
    document.getElementById('finalScore').textContent=score;
    document.getElementById('result').classList.add('show');
  }
},1000);

function restart(){
  score=0;timeLeft=30;
  document.getElementById('scoreVal').textContent='0';
  document.getElementById('timeVal').textContent='30';
  document.getElementById('cake').style.display='block';
  document.getElementById('result').classList.remove('show');
  moveCake();
  clearInterval(timer);
  timer=setInterval(()=>{
    timeLeft--;
    document.getElementById('timeVal').textContent=timeLeft;
    if(timeLeft<=0){
      clearInterval(timer);
      document.getElementById('cake').style.display='none';
      document.getElementById('finalScore').textContent=score;
      document.getElementById('result').classList.add('show');
    }
  },1000);
}
</script>
</body>
</html>
