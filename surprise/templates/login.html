<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise — Enter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0008;
    --surface: #1a0012;
    --border: rgba(245,200,66,0.2);
    --gold: #f5c842;
    --gold-dim: rgba(245,200,66,0.6);
    --rose: #ff85b3;
    --cream: #fff8f0;
    --text-dim: rgba(255,248,240,0.55);
    --radius: 16px;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
    color: var(--cream);
    overflow: hidden;
    position: relative;
  }

  .particle {
    position: fixed;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,200,66,0.35), transparent 70%);
    animation: drift linear infinite;
    pointer-events: none;
  }
  @keyframes drift {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 0.6; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  .card {
    position: relative;
    z-index: 10;
    width: min(420px, 92vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 40px 40px;
    box-shadow: 0 0 80px rgba(245,200,66,0.06), 0 40px 80px rgba(0,0,0,0.6);
    animation: cardEnter 0.9s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes cardEnter {
    from { transform: translateY(30px) scale(0.96); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }

  .seal {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #f5c842, #e8a800, #f5c842, #e8a800, #f5c842);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 28px;
    box-shadow: 0 0 30px rgba(245,200,66,0.4);
    animation: sealSpin 20s linear infinite;
  }
  @keyframes sealSpin {
    to { background: conic-gradient(from 360deg, #f5c842, #e8a800, #f5c842, #e8a800, #f5c842); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    text-align: center;
    color: var(--cream);
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 36px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .countdown-chip {
    text-align: center;
    font-size: 13px;
    color: var(--gold-dim);
    letter-spacing: 0.4px;
    margin-bottom: 32px;
    font-variant-numeric: tabular-nums;
    height: 20px;
    font-family: 'Inter', sans-serif;
  }

  .field-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .field-wrap {
    position: relative;
    margin-bottom: 24px;
  }
  .field-wrap input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(245,200,66,0.2);
    border-radius: var(--radius);
    padding: 14px 48px 14px 18px;
    font-size: 15px;
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    letter-spacing: 3px;
  }
  .field-wrap input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(245,200,66,0.12);
  }
  .eye-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .eye-btn:hover { opacity: 1; }

  .emoji-mask {
    min-height: 28px;
    font-size: 20px;
    letter-spacing: 4px;
    text-align: center;
    margin-bottom: 20px;
    word-break: break-all;
  }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #f5c842, #e8a800);
    border: none;
    border-radius: var(--radius);
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 600;
    color: #1a0012;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(245,200,66,0.25);
  }
  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(245,200,66,0.4);
  }
  .submit-btn:active { transform: translateY(0); }

  .error-msg {
    margin-top: 16px;
    text-align: center;
    font-size: 13px;
    color: var(--rose);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .error-msg.show { opacity: 1; }
</style>
</head>
<body>

<div class="card">
  <div class="seal">🎀</div>
  <h1>Birthday Surprise</h1>
  <p class="subtitle">Enter the secret password</p>
  <div class="countdown-chip" id="cd">Loading...</div>

  <form method="POST">
    {% csrf_token %}
    <p class="field-label">Secret Password</p>
    <div class="field-wrap">
      <input id="pw" type="password" name="password" placeholder="••••••••" autocomplete="off" oninput="onType(this)">
      <button type="button" class="eye-btn" onclick="toggleEye()">👁</button>
    </div>
    <div class="emoji-mask" id="mask"></div>
    <button class="submit-btn" type="submit">Open Your Surprise ✨</button>
  </form>
  <p class="error-msg {% if error %}show{% endif %}">{{ error }}</p>
</div>

<script>
  // Particles
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    const s=20+Math.random()*60;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${8+Math.random()*10}s;animation-delay:-${Math.random()*10}s`;
    document.body.appendChild(p);
  }

  // Countdown
  const bd=new Date('June 28, 2026 00:00:00').getTime();
  function updateCd(){
    const diff=bd-Date.now();
    if(diff<=0){document.getElementById('cd').textContent='🎉 Happy Birthday Thangachi!';return;}
    const d=Math.floor(diff/864e5),h=Math.floor(diff%864e5/36e5),m=Math.floor(diff%36e5/6e4),s=Math.floor(diff%6e4/1e3);
    document.getElementById('cd').textContent=`${d}d ${h}h ${m}m ${s}s until June 28 🎂`;
  }
  updateCd();setInterval(updateCd,1000);

  // Eye toggle
  function toggleEye(){
    const i=document.getElementById('pw');
    i.type=i.type==='password'?'text':'password';
  }

  // Emoji mask
  const emojis=['🎂','🎁','🎈','🎉','🍫','🧸','🌹','👑','💎','🌸'];
  function onType(el){
    const mask=document.getElementById('mask');
    mask.textContent=[...el.value].map(()=>emojis[Math.floor(Math.random()*emojis.length)]).join(' ');
  }
</script>
</body>
</html>
