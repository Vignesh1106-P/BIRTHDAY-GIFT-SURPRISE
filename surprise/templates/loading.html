<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preparing...</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0d0008;--gold:#f5c842;--cream:#fff8f0;--text-dim:rgba(255,248,240,0.55)}
  body{
    min-height:100vh;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'Inter',sans-serif;color:var(--cream);
  }
  .ring{
    width:100px;height:100px;
    border:3px solid rgba(245,200,66,0.12);
    border-top-color:var(--gold);
    border-radius:50%;
    animation:spin 1.2s linear infinite;
    margin-bottom:32px;
    position:relative;
  }
  .ring::after{
    content:'🎁';
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    font-size:36px;animation:counter 1.2s linear infinite reverse;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes counter{to{transform:rotate(-360deg)}}
  h2{
    font-family:'Playfair Display',serif;
    font-size:22px;font-weight:400;color:var(--cream);
    letter-spacing:0.5px;margin-bottom:12px;
  }
  p{font-size:13px;color:var(--text-dim);letter-spacing:0.8px;text-transform:uppercase}

  .dots span{animation:blink 1.4s infinite both}
  .dots span:nth-child(2){animation-delay:0.2s}
  .dots span:nth-child(3){animation-delay:0.4s}
  @keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
</style>
</head>
<body>
  <div class="ring"></div>
  <h2>Preparing your surprise</h2>
  <p>One moment<span class="dots"><span>.</span><span>.</span><span>.</span></span></p>
  <script>setTimeout(()=>window.location.href='/',3000)</script>
</body>
</html>
